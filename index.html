<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cope Labs</title>
  <meta name="description" content="Software tools for security, monitoring, and applied research.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 600px;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    .tagline {
      color: #888;
      font-size: 1.1rem;
      margin-bottom: 2.5rem;
    }
    .projects {
      list-style: none;
      margin-bottom: 2.5rem;
    }
    .projects li {
      margin-bottom: 1rem;
    }
    .projects a {
      color: #7cb3ff;
      text-decoration: none;
      font-weight: 500;
    }
    .projects a:hover {
      text-decoration: underline;
    }
    .projects .desc {
      color: #888;
      font-size: 0.9rem;
    }
    .contact {
      color: #888;
      font-size: 0.9rem;
    }
    .contact a {
      color: #7cb3ff;
      text-decoration: none;
    }
    .contact a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cope Labs</h1>
    <p class="tagline">Software tools for security, monitoring, and applied research.</p>

    <ul class="projects">
      <li>
        <a href="https://selvo.dev">selvo</a>
        <span class="desc"> &mdash; CVE scanner for Linux servers</span>
      </li>
      <li>
        <a href="https://github.com/Cope-Labs/margin">margin</a>
        <span class="desc"> &mdash; typed health classification library</span>
      </li>
      <li>
        <a href="https://github.com/Cope-Labs/margin-ha">margin-ha</a>
        <span class="desc"> &mdash; health monitoring for Home Assistant</span>
      </li>
    </ul>

    <p class="contact">
      <a href="https://github.com/Cope-Labs">GitHub</a>
    </p>
  </div>
</body>
</html>

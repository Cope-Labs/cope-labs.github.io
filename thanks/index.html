<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanks &mdash; Cope Labs</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="color-scheme" content="dark">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23f5f1e8'/><text x='50' y='68' font-size='52' font-family='Georgia,serif' font-weight='700' fill='%2316243b' text-anchor='middle'>CL</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink: #16243b;
      --muted: #5a6578;
      --accent: #cd5d2f;
      --line: rgba(22, 36, 59, 0.12);
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'Space Grotesk', -apple-system, system-ui, sans-serif;
    }

    body {
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 8%, #ffe1c9 0%, rgba(255,225,201,0) 42%),
        radial-gradient(circle at 90% 15%, #d7e6ff 0%, rgba(215,230,255,0) 36%),
        linear-gradient(170deg, #f7f5ef 0%, #ebe5d8 65%, #e8e2d6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.65;
      padding: 2rem;
    }

    .card {
      max-width: 520px;
      text-align: center;
    }

    h1 {
      font-family: var(--serif);
      font-size: 2.4rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      margin-bottom: 1rem;
      line-height: 1.1;
    }

    p {
      color: var(--muted);
      font-size: 1.05rem;
      margin-bottom: 2rem;
    }

    a.home {
      display: inline-block;
      font-size: 0.9rem;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--line);
      padding-bottom: 2px;
      transition: color 0.15s, border-color 0.15s;
    }

    a.home:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Got it &mdash; thanks.</h1>
    <p>Your message is on its way. You'll hear back from Cope Labs soon.</p>
    <a class="home" href="/">&larr; Back to copelabs.dev</a>
  </div>
</body>
</html>
